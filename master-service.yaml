apiVersion: v1
kind: Service
metadata:
  name: spark-master
  namespace: datastream-bigdata
spec:
  selector:
    app: spark-master
  ports:
    - protocol: TCP
      port: 7077
      targetPort: 7077
      name: spark-master
    - protocol: TCP
      port: 8080
      targetPort: 8080
      name: spark-ui