apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: datastream-bigdata
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spark-worker
  template:
    metadata:
      labels:
        app: spark-worker
    spec:
      containers:
      - name: spark-worker
        image: datastream/spark-worker:3.5.x-jdk17
        imagePullPolicy: IfNotPresent
        args: ["spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
        envFrom:
          - configMapRef:
              name: spark-config
        resources:
          limits:
            memory: "512Mi"
            cpu: "250m"
        ports:
        - containerPort: 8080